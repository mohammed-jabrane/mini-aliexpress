sonar.projectKey=mohammed-jabrane_mini-aliexpress
sonar.projectName=mini-aliexpress
sonar.organization=mohammed-jabrane

# Monorepo modules
sonar.modules=backend,frontend

# ─── Backend (Java / Spring Boot) ─────────────────────────
backend.sonar.projectName=Backend
backend.sonar.sources=src/main/java
backend.sonar.tests=src/test/java
backend.sonar.java.binaries=target/classes
backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ─── Frontend (Angular / TypeScript) ──────────────────────
frontend.sonar.projectName=Frontend
frontend.sonar.sources=src
frontend.sonar.tests=src
frontend.sonar.test.inclusions=**/*.spec.ts
frontend.sonar.exclusions=**/*.spec.ts,**/*.module.ts,**/environments/**
frontend.sonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info

# ─── Quality Gate ─────────────────────────────────────────
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=120

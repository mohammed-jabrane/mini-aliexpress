name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ──────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & run unit tests
        run: ./mvnw verify -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/
          retention-days: 7

  # ─── Frontend ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (headless)
        run: npx ng test --no-watch --code-coverage --browsers=ChromeHeadless

      - name: Build production bundle
        run: npx ng build --configuration=production

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ─── SonarCloud (monorepo) ────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}-${{ hashFiles('backend/pom.xml', 'frontend/package-lock.json') }}
          restore-keys: sonar-${{ runner.os }}-

      - name: Build backend (classes + coverage)
        working-directory: backend
        run: ./mvnw verify -B

      - name: Build frontend (coverage)
        working-directory: frontend
        run: npm ci && npx ng test --no-watch --code-coverage --browsers=ChromeHeadless

      - name: SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

  # ─── Quality Gate ─────────────────────────────────────────
  ci-passed:
    name: CI Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [backend-build, frontend-build, sonarcloud]
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend-build.result }}" != "success" ]; then
            echo "::error::Backend build/tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "::error::Frontend build/tests failed"
            exit 1
          fi
          if [ "${{ needs.sonarcloud.result }}" == "failure" ]; then
            echo "::error::SonarCloud quality gate failed"
            exit 1
          fi
          echo "All checks passed"

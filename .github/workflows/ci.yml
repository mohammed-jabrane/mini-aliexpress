name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ──────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & run unit tests
        run: ./mvnw verify -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/
          retention-days: 7

  # ─── Backend SonarQube (Docker) ───────────────────────────
  backend-sonar:
    name: Backend — SonarQube Analysis
    runs-on: ubuntu-latest
    needs: backend-build

    services:
      sonarqube:
        image: sonarqube:10-community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
        options: >-
          --health-cmd "curl -f http://localhost:9000/api/system/health || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 60s

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: sonar-${{ runner.os }}-

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube..."
          until curl -sf http://localhost:9000/api/system/health | grep -q '"health":"GREEN"'; do
            sleep 5
          done
          echo "SonarQube is ready"

      - name: Setup SonarQube (change default password & create token)
        id: sonar-setup
        run: |
          # Change default admin password
          curl -sf -u admin:admin \
            -X POST "http://localhost:9000/api/users/change_password" \
            -d "login=admin&previousPassword=admin&password=admin123"

          # Generate a project token
          TOKEN=$(curl -sf -u admin:admin123 \
            -X POST "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci-token" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run SonarQube analysis
        run: |
          ./mvnw verify sonar:sonar -B \
            -Dsonar.projectKey=mini-aliexpress-backend \
            -Dsonar.projectName="Mini AliExpress Backend" \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ steps.sonar-setup.outputs.token }} \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=120

  # ─── Frontend ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (headless)
        run: npx ng test --no-watch --code-coverage --browsers=ChromeHeadless

      - name: Build production bundle
        run: npx ng build --configuration=production

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ─── Quality Gate ─────────────────────────────────────────
  ci-passed:
    name: CI Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [backend-build, frontend-build, backend-sonar]
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend-build.result }}" != "success" ]; then
            echo "::error::Backend build/tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "::error::Frontend build/tests failed"
            exit 1
          fi
          if [ "${{ needs.backend-sonar.result }}" == "failure" ]; then
            echo "::error::SonarQube quality gate failed"
            exit 1
          fi
          echo "All checks passed"

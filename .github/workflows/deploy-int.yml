name: Deploy INT

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region"
        required: false
        type: string
        default: "westeurope"
      image_tag:
        description: "Base Docker image tag (e.g. 'main'). Frontend auto-appends '-int'."
        required: false
        type: string
        default: "main"

concurrency:
  group: deploy-int
  cancel-in-progress: false

jobs:
  # ─── Job 1: Terraform — Provision Infrastructure ───────
  provision:
    name: Terraform — Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      vm_public_ip: ${{ steps.tf-output.outputs.vm_public_ip }}
      vm_fqdn: ${{ steps.tf-output.outputs.vm_fqdn }}
    env:
      AZURE_CREDENTIALS: >
        {"clientId":"${{ secrets.ARM_CLIENT_ID }}",
         "clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}",
         "subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}",
         "tenantId":"${{ secrets.ARM_TENANT_ID }}"}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra/terraform/environments/azure-int
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform/environments/azure-int
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          terraform apply -auto-approve \
            -var "subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var "location=${{ inputs.location }}" \
            -var "ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var "postgres_password=${{ secrets.INT_POSTGRES_PASSWORD }}" \
            -var "keycloak_admin_password=${{ secrets.INT_KEYCLOAK_ADMIN_PASSWORD }}" \
            -var "minio_root_password=${{ secrets.INT_MINIO_ROOT_PASSWORD }}"

      - name: Capture Terraform outputs
        id: tf-output
        working-directory: infra/terraform/environments/azure-int
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          echo "vm_public_ip=$(terraform output -raw vm_public_ip)" >> "$GITHUB_OUTPUT"
          echo "vm_fqdn=$(terraform output -raw vm_fqdn)" >> "$GITHUB_OUTPUT"

  # ─── Job 2: Ansible — Install Docker ──────────────────
  install-docker:
    name: Ansible — Install Docker
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - uses: actions/checkout@v6

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/int_key
          chmod 600 ~/.ssh/int_key
          ssh-keyscan -H ${{ needs.provision.outputs.vm_public_ip }} >> ~/.ssh/known_hosts

      - name: Generate Ansible inventory
        run: |
          cat > infra/ansible/inventory/azure-int.yml << 'EOF'
          all:
            hosts:
              int-vm:
                ansible_host: ${{ needs.provision.outputs.vm_public_ip }}
                ansible_user: azureuser
                ansible_ssh_private_key_file: ~/.ssh/int_key
          EOF

      - name: Run provision playbook
        run: |
          ansible-playbook \
            -i infra/ansible/inventory/azure-int.yml \
            infra/ansible/playbooks/provision-int.yml

  # ─── Job 3: Ansible — Deploy Application ──────────────
  deploy-app:
    name: Ansible — Deploy Application
    runs-on: ubuntu-latest
    needs: [provision, install-docker]
    steps:
      - uses: actions/checkout@v6

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/int_key
          chmod 600 ~/.ssh/int_key
          ssh-keyscan -H ${{ needs.provision.outputs.vm_public_ip }} >> ~/.ssh/known_hosts

      - name: Generate Ansible inventory
        run: |
          cat > infra/ansible/inventory/azure-int.yml << 'EOF'
          all:
            hosts:
              int-vm:
                ansible_host: ${{ needs.provision.outputs.vm_public_ip }}
                ansible_user: azureuser
                ansible_ssh_private_key_file: ~/.ssh/int_key
          EOF

      - name: Run deploy playbook
        run: |
          ansible-playbook \
            -i infra/ansible/inventory/azure-int.yml \
            infra/ansible/playbooks/deploy-app-int.yml \
            -e "vm_ip=${{ needs.provision.outputs.vm_public_ip }}" \
            -e "postgres_password=${{ secrets.INT_POSTGRES_PASSWORD }}" \
            -e "keycloak_admin_password=${{ secrets.INT_KEYCLOAK_ADMIN_PASSWORD }}" \
            -e "minio_root_password=${{ secrets.INT_MINIO_ROOT_PASSWORD }}" \
            -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" \
            -e "dockerhub_password=${{ secrets.DOCKERHUB_PASSWORD }}" \
            -e "image_tag=${{ inputs.image_tag }}" \
            -e "vm_fqdn=${{ needs.provision.outputs.vm_fqdn }}"

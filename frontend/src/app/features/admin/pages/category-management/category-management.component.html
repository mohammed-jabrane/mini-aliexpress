<div class="category-management-container">
  <div class="page-header">
    <h1>Category Management</h1>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      Add Category
    </button>
  </div>

  @if (loading()) {
    <app-loading-spinner></app-loading-spinner>
  } @else if (categories().length === 0) {
    <p class="empty-state">No categories found. Create one to get started.</p>
  } @else {
    <table mat-table [dataSource]="dataSource" class="categories-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let category">{{ category.name }}</td>
      </ng-container>

      <ng-container matColumnDef="parent">
        <th mat-header-cell *matHeaderCellDef>Parent Category</th>
        <td mat-cell *matCellDef="let category">{{ getParentName(category.parentId) }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let category">
          <button mat-icon-button color="primary" (click)="openEditDialog(category)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteCategory(category)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  }
</div>

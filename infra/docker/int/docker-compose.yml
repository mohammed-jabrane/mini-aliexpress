name: mini-ali-int

services:

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mini-ali-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_aliexpress}
      POSTGRES_USER: ${POSTGRES_USER:-aliexpress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mini-ali-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aliexpress} -d ${POSTGRES_DB:-mini_aliexpress}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Kafka (KRaft mode — no Zookeeper)
  # ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mini-ali-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - mini-ali-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Confluent Schema Registry
  # ──────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: mini-ali-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    networks:
      - mini-ali-net

  # ──────────────────────────────────────────────
  # Kafka UI
  # ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mini-ali-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: int
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    ports:
      - "9090:8080"
    networks:
      - mini-ali-net

  # ──────────────────────────────────────────────
  # Minio (S3-compatible object storage)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mini-ali-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mini-ali-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Minio bucket initialization + seed images
  minio-init:
    image: minio/mc:latest
    container_name: mini-ali-minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./config/minio/seed-images:/seed-images:ro
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/product-images;
      mc mb --ignore-existing local/user-avatars;
      mc anonymous set download local/product-images;
      mc anonymous set download local/user-avatars;
      mc cp --recursive /seed-images/ local/product-images/;
      echo 'MinIO init complete — seed images uploaded';
      "
    networks:
      - mini-ali-net

  # ──────────────────────────────────────────────
  # Keycloak (Identity & Access Management)
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: mini-ali-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-aliexpress}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${VM_FQDN}
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8180
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8180:8180"
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      mini-ali-net:
        aliases:
          - ${VM_FQDN}

  # ──────────────────────────────────────────────
  # Backend (from Docker Hub)
  # ──────────────────────────────────────────────
  backend:
    image: ${DOCKERHUB_USERNAME}/mini-aliexpress-backend:${IMAGE_TAG:-latest}
    container_name: mini-ali-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: azure-int
      DB_HOST: postgres
      DB_USERNAME: ${POSTGRES_USER:-aliexpress}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_HOST: kafka
      KEYCLOAK_ISSUER_URI: http://${VM_FQDN}:8180/realms/mini-aliexpress
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - mini-ali-net

  # ──────────────────────────────────────────────
  # Frontend (from Docker Hub)
  # ──────────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME}/mini-aliexpress-frontend:${FRONTEND_IMAGE_TAG:-latest-int}
    container_name: mini-ali-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mini-ali-net

volumes:
  postgres_data:
  kafka_data:
  minio_data:

networks:
  mini-ali-net:
    driver: bridge

# ============================================================
# Mini AliExpress — Minikube (local-k8s) values
# ============================================================

# ── Backend ──────────────────────────────────────────────────
backend:
  replicaCount: 1
  image:
    repository: mini-aliexpress-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8080
  env:
    SPRING_PROFILES_ACTIVE: local-k8s
    SPRING_DATASOURCE_URL: jdbc:postgresql://mini-aliexpress-postgresql:5432/mini_aliexpress
    SPRING_DATASOURCE_USERNAME: aliexpress
    SPRING_DATASOURCE_PASSWORD: aliexpress_secret
    SPRING_KAFKA_BOOTSTRAP_SERVERS: mini-aliexpress-kafka:9092
    MINIO_URL: http://mini-aliexpress-minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    KEYCLOAK_ISSUER_URI: http://mini-aliexpress-keycloak:8080/realms/mini-aliexpress
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ── Frontend ─────────────────────────────────────────────────
frontend:
  replicaCount: 1
  image:
    repository: mini-aliexpress-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── Ingress ──────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: mini-aliexpress.local

# ── PostgreSQL (Bitnami sub-chart) ───────────────────────────
postgresql:
  enabled: true
  auth:
    postgresPassword: postgres_admin
    username: aliexpress
    password: aliexpress_secret
    database: mini_aliexpress
  primary:
    persistence:
      size: 2Gi

# ── Kafka (Bitnami sub-chart) ────────────────────────────────
kafka:
  enabled: true
  kraft:
    enabled: true
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
    replicaCount: 1
  broker:
    replicaCount: 1
    persistence:
      size: 2Gi

# ── Minio (Bitnami sub-chart) ────────────────────────────────
minio:
  enabled: true
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  defaultBuckets: "product-images,user-avatars"
  persistence:
    size: 2Gi

# ── Keycloak (Bitnami sub-chart) ─────────────────────────────
keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: admin
  postgresql:
    enabled: false
  externalDatabase:
    host: mini-aliexpress-postgresql
    port: 5432
    user: aliexpress
    password: aliexpress_secret
    database: keycloak

# ============================================================
# Profile: azure-int (INT — Azure VM with Docker Compose)
# ============================================================
# Infrastructure: Packer + Terraform + Ansible
# Services run as Docker containers on a single Azure VM.
# Secrets injected via Ansible Vault → environment variables.

spring:
  # ── DataSource ─────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/mini_aliexpress
    username: ${DB_USERNAME:aliexpress}
    password: ${DB_PASSWORD:aliexpress_secret}
    driver-class-name: org.postgresql.Driver

  # ── Kafka ──────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    consumer:
      group-id: mini-aliexpress
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # ── Security (Keycloak) ────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/mini-aliexpress}

# ── Minio S3 ──────────────────────────────────
minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    product-images: product-images
    user-avatars: user-avatars

# ── Logging ──────────────────────────────────
logging:
  level:
    ma.mohammedjabrane: INFO
    org.springframework.security: INFO

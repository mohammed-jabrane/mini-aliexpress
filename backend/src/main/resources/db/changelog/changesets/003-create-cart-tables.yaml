databaseChangeLog:
  - changeSet:
      id: 003-create-cart-tables
      author: mini-aliexpress
      changes:
        - createTable:
            tableName: cart
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

        - createTable:
            tableName: cart_item
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cart_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: decimal(12,2)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: cart_item
            baseColumnNames: cart_id
            referencedTableName: cart
            referencedColumnNames: id
            constraintName: fk_cart_item_cart
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: cart_item
            baseColumnNames: product_id
            referencedTableName: product
            referencedColumnNames: id
            constraintName: fk_cart_item_product

        - addUniqueConstraint:
            tableName: cart_item
            columnNames: cart_id, product_id
            constraintName: uq_cart_item_cart_product

        - sql:
            sql: ALTER TABLE cart_item ADD CONSTRAINT chk_cart_item_quantity CHECK (quantity > 0);

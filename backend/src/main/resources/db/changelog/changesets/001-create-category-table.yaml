databaseChangeLog:
  - changeSet:
      id: 001-create-category-table
      author: mini-aliexpress
      changes:
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: uuid
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: category
            baseColumnNames: parent_id
            referencedTableName: category
            referencedColumnNames: id
            constraintName: fk_category_parent

        - createIndex:
            tableName: category
            indexName: idx_category_parent_id
            columns:
              - column:
                  name: parent_id
